<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Hello AWS - SQS 테스트</title>
</head>
<body>
    <h1>SQS 메시지 전송 테스트</h1>
    <p>EC2 + Docker + Spring Boot</p>

    <input id="msg" type="text" placeholder="보낼 메시지" style="width:300px" value="hello sqs">
    <button onclick="send()">SQS로 전송</button>
    <pre id="result"></pre>

    <script>
        async function send() {
            const message = document.getElementById('msg').value;
            const res = await fetch('/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            document.getElementById('result').textContent = await res.text();
        }
    </script>
</body>
</html>
